<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Gallery — Benja Juster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#fff;font-family:'Space Grotesk','Inter',system-ui,sans-serif;overflow-x:hidden}

/* ── Password Gate ── */
#gate{position:fixed;inset:0;z-index:9999;background:#0A0A0A;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#gate input{background:#1A1A1A;border:1px solid rgba(255,255,255,0.15);color:#fff;padding:12px 20px;border-radius:8px;font-size:16px;width:260px;text-align:center;font-family:inherit}
#gate input::placeholder{color:rgba(255,255,255,0.35)}
#gate input:focus{outline:none;border-color:#FF4D00}
#gate button{background:#FF4D00;color:#fff;border:none;padding:10px 32px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
#gate button:hover{background:#E64400}
#gate .err{color:#FF4D00;font-size:13px;min-height:20px}
#gate h2{font-size:18px;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:8px}

/* ── Main Layout ── */
#app{display:none;padding:24px clamp(16px,4vw,48px) 80px}
h1{font-size:clamp(24px,4vw,36px);font-weight:700;margin-bottom:8px}
.subtitle{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:40px}

/* ── Sidebar Nav ── */
.layout{display:flex;gap:32px}
.sidebar{position:sticky;top:24px;align-self:flex-start;min-width:200px;max-height:calc(100vh - 48px);overflow-y:auto;padding-right:12px}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}
.sidebar a{display:block;padding:6px 12px;color:rgba(255,255,255,0.5);text-decoration:none;font-size:13px;border-radius:6px;transition:all 0.15s}
.sidebar a:hover{color:#fff;background:rgba(255,255,255,0.06)}
.sidebar a .count{color:rgba(255,255,255,0.25);margin-left:4px;font-size:11px}
.main{flex:1;min-width:0}

/* ── Project Section ── */
.project{margin-bottom:56px}
.project-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.project-header h2{font-size:18px;font-weight:600}
.project-header .meta{color:rgba(255,255,255,0.4);font-size:13px}
.dl-project{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap}
.dl-project:hover{border-color:#FF4D00;color:#FF4D00}
.dl-project:disabled{opacity:0.4;cursor:wait}

/* ── Image Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.grid .thumb{position:relative;aspect-ratio:4/3;overflow:hidden;border-radius:6px;cursor:pointer;background:#1A1A1A}
.grid .thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.2s}
.grid .thumb:hover img{transform:scale(1.03)}
.grid .thumb .dl-btn{position:absolute;bottom:6px;right:6px;width:28px;height:28px;background:rgba(0,0,0,0.7);border:none;border-radius:6px;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;backdrop-filter:blur(4px)}
.grid .thumb:hover .dl-btn{display:flex}
.grid .thumb .dl-btn:hover{background:#FF4D00}

/* ── Lightbox ── */
#lightbox{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px;user-select:none}
#lightbox .lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:0.6;z-index:2}
#lightbox .lb-close:hover{opacity:1}
#lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#lightbox .lb-nav:hover{background:rgba(255,255,255,0.2)}
#lightbox .lb-prev{left:16px}
#lightbox .lb-next{right:16px}
#lightbox .lb-info{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:16px;align-items:center;color:rgba(255,255,255,0.5);font-size:13px}
#lightbox .lb-dl{background:none;border:1px solid rgba(255,255,255,0.25);color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
#lightbox .lb-dl:hover{border-color:#FF4D00;color:#FF4D00}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{display:none}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>

<!-- Password Gate -->
<div id="gate">
  <h2>Gallery Access</h2>
  <input type="password" id="pw" placeholder="Password" autofocus>
  <button onclick="tryAuth()">Enter</button>
  <div class="err" id="err"></div>
</div>

<!-- Main App -->
<div id="app">
  <h1>Image Gallery</h1>
  <p class="subtitle" id="total-count"></p>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main" id="main"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLb()">&times;</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">&#8249;</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-nav lb-next" onclick="lbNav(1)">&#8250;</button>
  <div class="lb-info">
    <span id="lb-counter"></span>
    <span id="lb-name"></span>
    <button class="lb-dl" onclick="dlCurrent()">&#8595; Download</button>
  </div>
</div>

// ── Password ──
function tryAuth(){
  const v=document.getElementById('pw').value;
  if(v==='sasquatch'){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    sessionStorage.setItem('gallery_auth','1');
  } else {
    document.getElementById('err').textContent='Wrong password';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth()});
if(sessionStorage.getItem('gallery_auth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
}

// ── Count ──
const totalImages = projects.reduce((s,p)=>s+p.images.length,0);
document.getElementById('total-count').textContent = `${totalImages} images across ${projects.length} projects`;

// ── Build Sidebar ──
const sidebar = document.getElementById('sidebar');
projects.forEach(p=>{
  const a = document.createElement('a');
  a.href = `#${p.id}`;
  a.innerHTML = `${p.title} <span class="count">${p.images.length}</span>`;
  sidebar.appendChild(a);
});

// ── Build Grid ──
const main = document.getElementById('main');
let allImages = []; // flat list for lightbox

projects.forEach(p=>{
  const section = document.createElement('div');
  section.className = 'project';
  section.id = p.id;

  const startIdx = allImages.length;

  section.innerHTML = `
    <div class="project-header">
      <div>
        <h2>${p.title}</h2>
        <span class="meta">${p.client} · ${p.year} · ${p.images.length} images</span>
      </div>
      <button class="dl-project" onclick="dlProject('${p.id}')">&#8595; Download All (${p.images.length})</button>
    </div>
    <div class="grid">
      ${p.images.map((src, i) => {
        const globalIdx = startIdx + i;
        const fname = src.split('/').pop();
        return `<div class="thumb" onclick="openLb(${globalIdx})">
          <img src="/${src}" alt="${fname}" loading="lazy">
          <button class="dl-btn" onclick="event.stopPropagation();dlImage('/${src}','${fname}')" title="Download">&#8595;</button>
        </div>`;
      }).join('')}
    </div>
  `;
  main.appendChild(section);

  p.images.forEach(src => {
    allImages.push({ src: '/' + src, name: src.split('/').pop(), project: p.title });
  });
});

// ── Lightbox ──
let lbIdx = 0;
const lbEl = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbCounter = document.getElementById('lb-counter');
const lbName = document.getElementById('lb-name');

function openLb(idx){
  lbIdx = idx;
  updateLb();
  lbEl.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb(){
  lbEl.classList.remove('open');
  document.body.style.overflow = '';
}
function lbNav(dir){
  lbIdx = (lbIdx + dir + allImages.length) % allImages.length;
  updateLb();
}
function updateLb(){
  const item = allImages[lbIdx];
  lbImg.src = item.src;
  lbCounter.textContent = `${lbIdx+1} / ${allImages.length}`;
  lbName.textContent = item.name;
}

// Keyboard nav
document.addEventListener('keydown', e=>{
  if(!lbEl.classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowLeft') lbNav(-1);
  if(e.key==='ArrowRight') lbNav(1);
});
// Click backdrop to close
lbEl.addEventListener('click', e=>{
  if(e.target === lbEl) closeLb();
});

// ── Downloads ──
function dlImage(src, name){
  const a = document.createElement('a');
  a.href = src;
  a.download = name;
  a.click();
}

function dlCurrent(){
  const item = allImages[lbIdx];
  dlImage(item.src, item.name);
}

async function dlProject(id){
  const proj = projects.find(p=>p.id===id);
  if(!proj) return;
  const btn = document.querySelector(`#${id} .dl-project`);
  btn.disabled = true;
  btn.textContent = 'Zipping...';

  try {
    const zip = new JSZip();
    const folder = zip.folder(proj.title.replace(/[^a-zA-Z0-9 _'-]/g,''));
    let loaded = 0;

    await Promise.all(proj.images.map(async (src) => {
      try {
        const resp = await fetch('/' + src);
        const blob = await resp.blob();
        const name = src.split('/').pop();
        folder.file(name, blob);
        loaded++;
        btn.textContent = `Zipping ${loaded}/${proj.images.length}...`;
      } catch(e){ console.warn('Skip:', src, e); }
    }));

    const content = await zip.generateAsync({type:'blob'});
    saveAs(content, `${proj.title.replace(/[^a-zA-Z0-9 _'-]/g,'')}.zip`);
  } catch(e){
    console.error('Zip error:', e);
    alert('Download failed: ' + e.message);
  }

  btn.disabled = false;
  btn.innerHTML = `&#8595; Download All (${proj.images.length})`;
}
</script>
</body>
</html>
