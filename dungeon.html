      height: 100%;

    body {

      color: #FFFFFF;

    .serif {

    .login-container {

      display: flex;
      flex-direction: column;

      justify-content: center;

    .login-header {

      top: 40px;
      left: 40px;
      display: flex;
      gap: 20px;

    .wordmark {

      font-size: 26px;
      font-weight: 400;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    .lock-icon {
      position: absolute;
      top: 40px;
      right: 40px;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-icon::before {
      content: '';
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 50%;

    .login-content {
      text-align: center;
      max-width: 600px;
      padding: 0 20px;
    }

    .login-title {
      font-family: 'Fraunces', serif;
      font-size: 64px;
      font-weight: 400;
      color: #FFFFFF;
      margin-bottom: 40px;
      letter-spacing: -1px;
    }

    .login-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 30px;
      line-height: 1.6;
      font-weight: 400;
    }

    .password-form {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 30px;
      justify-content: center;
    }

    .password-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: #FFFFFF;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      padding: 12px 0;
      width: 200px;
      outline: none;
      transition: all 0.3s ease;
    }

    .password-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .password-input:focus {
      border-bottom-color: #FF4D00;
    }

    .password-input.shake {
      animation: shake 0.4s ease-in-out;
    }

    .submit-button {
      background: transparent;
      border: none;
      color: #FF4D00;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s ease;
      padding: 12px 4px;
      display: flex;
      align-items: center;
    }

    .submit-button:hover {
      transform: translateX(4px);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .gallery-container {
      min-height: 100vh;
      background: #0F0F0F;
      padding: 40px 20px;
      animation: fadeIn 0.8s ease-out;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 60px;
      padding: 0 20px;
    }

    .gallery-header-text {
      flex: 1;
    }

    .back-link {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      transition: color 0.3s ease;
      display: inline-block;
      margin-bottom: 16px;
    }

    .back-link:hover {
      color: #FF4D00;
    }

    .gallery-title {
      font-family: 'Fraunces', serif;
      font-size: 52px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .gallery-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      max-width: 600px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    @media (max-width: 1024px) {
      .grid-container {
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
      }
    }

    @media (max-width: 640px) {
      .grid-container {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .gallery-title {
        font-size: 36px;
      }

      .login-container {
        min-height: 100dvh;
        padding: 80px 20px 40px;
        justify-content: center;
      }

      .login-header {
        top: 20px;
        left: 20px;
      }

      .login-title {
        font-size: 40px;
        margin-bottom: 24px;
      }

      .login-subtitle {
        font-size: 13px;
        margin-bottom: 20px;
      }

      .login-content {
        max-width: 100%;
      }

      .password-form {
        flex-direction: column;
        gap: 16px;
      }

      .password-input {
        width: 100%;
        max-width: 260px;
        font-size: 16px;
      }

      .wordmark {
        font-size: 22px;
      }
    }

    .project-card {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .project-card:hover .project-thumbnail {
      transform: scale(1.05);
    }

    .project-thumbnail {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      transition: transform 0.3s ease;
      background: #1a1a1a;
    }

    .project-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .project-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #FFFFFF;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .project-subtitle {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 4px;
      font-weight: 400;
      transition: color 0.3s ease;
    }

    .project-card:hover .project-subtitle {
      color: rgba(255, 255, 255, 0.6);
    }

    .gallery-footer {
      text-align: center;
      padding: 60px 20px 40px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.5px;
    }

    .overlay-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(4px);
      z-index: 100;
      animation: fadeIn 0.3s ease;
      overflow-y: auto;
    }

    .overlay-content {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      padding: 60px 40px 80px;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .overlay-close {
      position: absolute;
      top: 40px;
      right: 40px;
      background: none;
      border: none;
      color: #FFFFFF;
      font-size: 28px;
      cursor: pointer;
      z-index: 101;
      transition: all 0.3s ease;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay-close:hover {
      color: #FF4D00;
      transform: rotate(90deg);
    }

    .overlay-counter {
      position: absolute;
      top: 40px;
      left: 40px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 1px;
    }

    .overlay-hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      margin-bottom: 40px;
      background: #1a1a1a;
      overflow: hidden;
    }

    .overlay-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay-meta {
      display: flex;
      gap: 40px;
      margin-bottom: 30px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta-label {
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .meta-value {
      color: #FFFFFF;
    }

    .overlay-title {
      font-family: 'Fraunces', serif;
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 30px;
      line-height: 1.2;
      letter-spacing: -1px;

    .overlay-description {

      line-height: 1.7;

      margin-bottom: 40px;

    .overlay-credits {

      margin-bottom: 30px;
      line-height: 1.6;

      gap: 12px;
      overflow-x: auto;
      padding-bottom: 40px;
      scroll-behavior: smooth;
      margin-bottom: 40px;

    .gallery-thumb {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #1a1a1a;
    }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-thumb:hover {
      border-color: #FF4D00;
      transform: scale(1.05);

    .overlay-hero {
      position: relative;
    }

    .hero-arrow {

      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: opacity 0.3s ease, background 0.2s ease;
      color: #FFFFFF;
      font-size: 24px;
      line-height: 1;
    }

    .hero-arrow:hover {
      background: #FF4D00;
    }

    .hero-arrow-left { left: 16px; }
    .hero-arrow-right { right: 16px; }

    .hero-counter {
      position: absolute;
      bottom: 12px;
      right: 14px;
      z-index: 3;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(8px);

    .thumb-strip-wrap {
      position: relative;
      margin-bottom: 32px;

    .gallery-thumb-active {
      border-color: #FF4D00 !important;
      opacity: 1 !important;

    .gallery-thumb {
      opacity: 0.5;
      transition: all 0.3s ease;
    }

    .gallery-thumb:hover {
      opacity: 0.8;
    }

    .strip-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #FFFFFF;
      font-size: 18px;
      line-height: 1;
      backdrop-filter: blur(8px);

    .strip-arrow:hover { background: #FF4D00; }
    .strip-arrow-left { left: -4px; }
    .strip-arrow-right { right: -4px; }

      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
      background: #1a1a1a;
    }

    .lightbox-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: none;
      color: #FFFFFF;
      font-size: 32px;
      cursor: pointer;
      z-index: 201;
      transition: all 0.3s ease;
    }

    .lightbox-close:hover {
      color: #FF4D00;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      font-size: 36px;
      cursor: pointer;
      padding: 20px;
      transition: color 0.3s ease;
    }

    .lightbox-nav:hover {
      color: #FF4D00;
    }

    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }

    .lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 1px;
    }

    .overlay-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      gap: 20px;
    }

    .nav-button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-button:hover {
      color: #FF4D00;
    }

    .nav-button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .nav-spacer {
      flex: 1;
    }

    @media (max-width: 640px) {
      .gallery-container {
        padding: 24px 16px;
      }

      .gallery-header {
        padding: 0;
        margin-bottom: 40px;
      }

      .overlay-content {
        padding: 50px 24px 60px;
      }

      .overlay-close {
        top: 24px;
        right: 24px;
      }

      .overlay-counter {
        top: 24px;
        left: 24px;
      }

      .overlay-title {
        font-size: 32px;
      }

      .overlay-meta {
        flex-direction: column;
        gap: 16px;
      }

      .overlay-nav {
        flex-direction: column;
      }

      .nav-button {
        width: 100%;
        justify-content: center;
      }

      .hero-arrow {
        width: 32px;
        height: 32px;
        font-size: 18px;
        opacity: 0.7 !important;
      }

      .hero-arrow-left { left: 8px; }
      .hero-arrow-right { right: 8px; }
    }
  </style>

        window.addEventListener('resize', onResize);

    function LoginScreen({ onLogin }) {
      const [password, setPassword] = React.useState('');
      const [shake, setShake] = React.useState(false);
      const inputRef = React.useRef(null);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (password.toLowerCase() === 'sasquatch') {
          onLogin();
        } else {
          setShake(true);
          setTimeout(() => setShake(false), 400);
          setPassword('');
        }
      };

      return React.createElement('div', { className: 'login-container' },
        React.createElement('div', { className: 'lock-icon' }),
        React.createElement('div', { className: 'login-header' },
          React.createElement('div', { className: 'wordmark serif' }, 'Benja')
        ),
        React.createElement('div', { className: 'login-content' },
          React.createElement('h1', { className: 'login-title serif' }, 'The Dungeon'),
          React.createElement('p', { className: 'login-subtitle' },
            'Enter the name of the mythical creature that protects these pages:'
          ),
          React.createElement('form', { className: 'password-form', onSubmit: handleSubmit },
            React.createElement('input', {
              ref: inputRef,
              type: 'password',
              className: `password-input ${shake ? 'shake' : ''}`,
              placeholder: 'Enter password',
              value: password,
              onChange: (e) => setPassword(e.target.value),
              autoFocus: true
            }),
            React.createElement('button', { 
              type: 'submit',
              className: 'submit-button'
            }, '→')
          )
        )
      );
    }

      }, [selectedProject]);

      return React.createElement(React.Fragment, null,

    function CaseStudy({ project, index, totalProjects, onClose, onNext, onPrev }) {
      const isMobile = useIsMobile();
      const overlayRef = React.useRef(null);
      const stripRef = React.useRef(null);
      const gallery = project.gallery || [];
      const allMedia = gallery.length > 0 ? gallery : (project.thumbnail ? [project.thumbnail] : []);
      const [activeIdx, setActiveIdx] = React.useState(0);
      const [heroHover, setHeroHover] = React.useState(false);
      const [imgOrientation, setImgOrientation] = React.useState(null);

      const handleOverlayClick = (e) => {
        if (e.target === overlayRef.current) onClose();
      };

      const goNext = (e) => { e && e.stopPropagation(); setActiveIdx((activeIdx + 1) % allMedia.length); };
      const goPrev = (e) => { e && e.stopPropagation(); setActiveIdx((activeIdx - 1 + allMedia.length) % allMedia.length); };

      React.useEffect(() => {
        if (overlayRef.current) overlayRef.current.scrollTop = 0;
      }, []);

      const [heroOpacity, setHeroOpacity] = React.useState(0);
      const prevOrientationRef = React.useRef(null);

      React.useEffect(() => {
        if (allMedia.length === 0) return;
        const img = new Image();
        img.onload = () => {
          const newOrientation = img.naturalHeight > img.naturalWidth ? 'portrait' : 'landscape';
          if (prevOrientationRef.current !== null && newOrientation !== prevOrientationRef.current) {
            setHeroOpacity(0);
            setTimeout(() => {
              setImgOrientation(newOrientation);
              prevOrientationRef.current = newOrientation;
              setTimeout(() => setHeroOpacity(1), 50);
            }, 200);
          } else {
            setImgOrientation(newOrientation);
            prevOrientationRef.current = newOrientation;
            setHeroOpacity(1);
          }
        };
        img.src = allMedia[activeIdx] + '?format=1500w';
        if (stripRef.current) {
          const thumb = stripRef.current.children[activeIdx];
          if (thumb) thumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      }, [activeIdx, allMedia.length]);

      React.useEffect(() => {
        const handleKey = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowRight') goNext();
          if (e.key === 'ArrowLeft') goPrev();
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [activeIdx, allMedia.length]);

      const scrollStrip = (dir) => {
        if (stripRef.current) stripRef.current.scrollBy({ left: dir * 320, behavior: 'smooth' });
      };

      return React.createElement('div', {
        ref: overlayRef,
        className: 'overlay-bg',
        onClick: handleOverlayClick
      },
        React.createElement('div', { className: 'overlay-content' },
          React.createElement('button', {
            className: 'overlay-close',
            onClick: onClose
          }, '\u00d7'),
          React.createElement('div', { className: 'overlay-counter' },
            `${String(index + 1).padStart(2, '0')} / ${String(totalProjects).padStart(2, '0')}`
          ),
          React.createElement('div', {
            className: 'overlay-hero',
            onMouseEnter: () => setHeroHover(true),
            onMouseLeave: () => setHeroHover(false),
            style: { position: 'relative', width: '100%', height: isMobile ? '40vh' : '60vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }
          },
            React.createElement('div', {
              onClick: allMedia.length > 1 ? goNext : undefined,
              style: {
                cursor: allMedia.length > 1 ? 'pointer' : 'default',
                position: 'relative',
                height: '100%',
                aspectRatio: imgOrientation === 'portrait' ? '3/4' : (imgOrientation === null ? '16/9' : '16/9'),
                maxWidth: '100%',
                borderRadius: 10, overflow: 'hidden', background: '#0F0F0F',
                opacity: heroOpacity,
                transition: 'opacity 0.2s ease'
              }
            },
              allMedia.length > 0
                ? React.createElement('img', {
                    src: allMedia[activeIdx] + '?format=1500w',
                    alt: project.title,
                    style: {
                      width: '100%', height: '100%',
                      objectFit: 'contain'
                    }
                  })
                : project.title,
              allMedia.length > 1 && React.createElement('div', {
                className: 'hero-counter'
              }, `${activeIdx + 1} / ${allMedia.length}`)
            ),
            allMedia.length > 1 && React.createElement('button', {
              className: 'hero-arrow hero-arrow-left',
              onClick: goPrev,
              style: { opacity: isMobile ? 0.7 : (heroHover ? 1 : 0) }
            }, '\u2039'),
            allMedia.length > 1 && React.createElement('button', {
              className: 'hero-arrow hero-arrow-right',
              onClick: goNext,
              style: { opacity: isMobile ? 0.7 : (heroHover ? 1 : 0) }
            }, '\u203a')
          ),
          allMedia.length > 1 && React.createElement('div', { className: 'thumb-strip-wrap' },
            allMedia.length > 8 && React.createElement('button', {
              className: 'strip-arrow strip-arrow-left',
              onClick: () => scrollStrip(-1)
            }, '\u2039'),
            React.createElement('div', {
              ref: stripRef,
              className: 'overlay-gallery'
            },
              allMedia.map((url, i) =>
                React.createElement('div', {
                  key: i,
                  className: 'gallery-thumb' + (i === activeIdx ? ' gallery-thumb-active' : ''),
                  onClick: () => setActiveIdx(i)
                },
                  React.createElement('img', {
                    src: url + '?format=300w',
                    alt: `${project.title} ${i + 1}`,
                    loading: 'lazy'
                  })
                )
              )
            ),
            allMedia.length > 8 && React.createElement('button', {
              className: 'strip-arrow strip-arrow-right',
              onClick: () => scrollStrip(1)
            }, '\u203a')
          ),
          project.video && React.createElement('div', {
            className: 'video-embed'
          },
            React.createElement('iframe', {
              src: project.videoType === 'vimeo'
                ? 'https://player.vimeo.com/video/' + project.video + '?byline=0&portrait=0'
                : 'https://www.youtube.com/embed/' + project.video + '?rel=0&modestbranding=1',
              style: { width: '100%', height: '100%', border: 'none' },
              allow: 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture',
              allowFullScreen: true
            })
          ),
          React.createElement('div', { className: 'overlay-meta' },
            React.createElement('div', { className: 'meta-item' },
              React.createElement('div', { className: 'meta-label' }, 'Role'),
              React.createElement('div', { className: 'meta-value' }, project.role)
            ),
            project.client && React.createElement('div', { className: 'meta-item' },
              React.createElement('div', { className: 'meta-label' }, 'Client'),
              React.createElement('div', { className: 'meta-value' }, project.client)
            ),
            project.scope && React.createElement('div', { className: 'meta-item' },
              React.createElement('div', { className: 'meta-label' }, 'Scope'),
              React.createElement('div', { className: 'meta-value' }, project.scope)
            )
          ),
          React.createElement('h2', { className: 'overlay-title serif' }, project.title),
          React.createElement('div', { className: 'overlay-description' }, project.desc),
          project.credits && React.createElement('div', { className: 'overlay-credits' }, project.credits),
          React.createElement('div', { className: 'overlay-nav' },
            React.createElement('button', {
              className: 'nav-button',
              onClick: onPrev,
              disabled: index === 0
            },
              '\u2190 ',
              index > 0 && React.createElement('span', null, dungeonProjects[index - 1].title)
            ),
            React.createElement('div', { className: 'nav-spacer' }),
            React.createElement('button', {
              className: 'nav-button',
              onClick: onNext,
              disabled: index === totalProjects - 1
            },
              index < totalProjects - 1 && React.createElement('span', null, dungeonProjects[index + 1].title),
              ' \u2192'
            )
          )
        )
      );
    }

    function App() {
      const [isLoggedIn, setIsLoggedIn] = React.useState(false);
      const [transitioning, setTransitioning] = React.useState(false);

      const handleLogin = () => {
        setTransitioning(true);
        setTimeout(() => {
          setIsLoggedIn(true);
          setTransitioning(false);
        }, 500);
      };

      return React.createElement('div', {
        style: {
          opacity: transitioning ? 0 : 1,
          transition: 'opacity 0.5s ease'
        }
      },
        isLoggedIn
          ? React.createElement(Gallery, { onLogout: () => setIsLoggedIn(false) })
          : React.createElement(LoginScreen, { onLogin: handleLogin })
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
  <div id="custom-cursor" style="position:fixed;top:0;left:0;width:8px;height:8px;border-radius:50%;background:#FF4D00;pointer-events:none;z-index:9999;mix-blend-mode:difference;transform:translate(-100px,-100px)"></div>
  <div id="cursor-ring" style="position:fixed;top:0;left:0;width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.45);pointer-events:none;z-index:9998;opacity:0.5;transition:border 0.3s,opacity 0.3s;transform:translate(-100px,-100px)"></div>
  <script>
  (function(){
    var dot=document.getElementById('custom-cursor'),ring=document.getElementById('cursor-ring');
    var mx=-100,my=-100,sx=-100,sy=-100,rx=-100,ry=-100,hovering=false;
    window.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY},{passive:true});
    document.addEventListener('mouseover',function(e){if(e.target.closest('a,button,[data-cursor]')){hovering=true;ring.style.border='2px solid #FF4D00';ring.style.opacity='1';}});
    document.addEventListener('mouseout',function(e){if(e.target.closest('a,button,[data-cursor]')){hovering=false;ring.style.border='2px solid rgba(255,255,255,0.45)';ring.style.opacity='0.5';}});
    (function animate(){
      sx+=(mx-sx)*0.54;sy+=(my-sy)*0.54;
      rx+=(mx-rx)*0.24;ry+=(my-ry)*0.24;
      dot.style.transform='translate('+sx+'px,'+sy+'px) translate(-50%,-50%)';
      ring.style.transform='translate('+rx+'px,'+ry+'px) translate(-50%,-50%) scale('+(hovering?1:0.5)+')';
      requestAnimationFrame(animate);
    })();
  })();
  </script>
</body>
</html>
