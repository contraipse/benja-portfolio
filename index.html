// âââ HOOKS âââ
function useInView(opts = {}) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: opts.threshold || 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function useScrollProgress(ref) {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    let rafId = null;
    const onScroll = () => {
      if (rafId) return; // throttle to one update per animation frame
      rafId = requestAnimationFrame(() => {
        rafId = null;
        const rect = el.getBoundingClientRect();
        const windowH = window.innerHeight;
        const raw = (windowH - rect.top) / (windowH + rect.height);
        setProgress(Math.max(0, Math.min(1, raw)));
      });
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => { window.removeEventListener("scroll", onScroll); if (rafId) cancelAnimationFrame(rafId); };
  }, []);
  return progress;
}

// âââ RESPONSIVE HOOK âââ
function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = useState(window.innerWidth <= breakpoint);
  useEffect(() => {
    const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, [breakpoint]);
  return isMobile;
}

// âââ CUSTOM CURSOR (FIX #3: Faster + new hover style) âââ
// Changed: smoothing 0.15 â 0.45, hover is now a crosshair/ring with no fill
function CustomCursor() {
  const isMobile = useIsMobile();
  const [pos, setPos] = useState({ x: -100, y: -100 });
  const [isHovering, setIsHovering] = useState(false);
  const [label, setLabel] = useState("");
  const smoothPos = useRef({ x: -100, y: -100 });
  const frameRef = useRef(null);

  useEffect(() => {
    const move = (e) => { setPos({ x: e.clientX, y: e.clientY }); };
    window.addEventListener("mousemove", move, { passive: true });
    const over = (e) => {
      const el = e.target.closest("a, button, [data-cursor]");
      if (el) { setIsHovering(true); setLabel(el.dataset.cursor || ""); }
    };
    const out = (e) => {
      const el = e.target.closest("a, button, [data-cursor]");
      if (el) { setIsHovering(false); setLabel(""); }
    };
    document.addEventListener("mouseover", over);
    document.addEventListener("mouseout", out);
    return () => {
      window.removeEventListener("mousemove", move);
      document.removeEventListener("mouseover", over);
      document.removeEventListener("mouseout", out);
    };
  }, []);

  // Smooth follow â FASTER lerp factor (was 0.15, now 0.45)
  useEffect(() => {
    const animate = () => {
      smoothPos.current.x += (pos.x - smoothPos.current.x) * 0.45;
      smoothPos.current.y += (pos.y - smoothPos.current.y) * 0.45;
      const el = document.getElementById("custom-cursor");
      const ring = document.getElementById("cursor-ring");
      if (el) {
        el.style.transform = `translate(${smoothPos.current.x}px, ${smoothPos.current.y}px) translate(-50%, -50%)`;
      }
      if (ring) {
        // Ring follows slightly slower for nice trailing effect
        const ringEl = ring;
        const rx = parseFloat(ringEl.dataset.x || smoothPos.current.x);
        const ry = parseFloat(ringEl.dataset.y || smoothPos.current.y);
        const nx = rx + (pos.x - rx) * 0.2;
        const ny = ry + (pos.y - ry) * 0.2;
        ringEl.dataset.x = nx;
        ringEl.dataset.y = ny;
        ringEl.style.transform = `translate(${nx}px, ${ny}px) translate(-50%, -50%) scale(${isHovering ? 1 : 0.5})`;
      }
      frameRef.current = requestAnimationFrame(animate);
    };
    frameRef.current = requestAnimationFrame(animate);
    return () => { if (frameRef.current) cancelAnimationFrame(frameRef.current); };
  }, [pos, isHovering]);

  // Hide custom cursor on touch/mobile â restore default cursor
  useEffect(() => {
    document.body.style.cursor = isMobile ? "auto" : "none";
    return () => { document.body.style.cursor = "auto"; };
  }, [isMobile]);

  if (isMobile) return null;

  return (
    <React.Fragment>
      {/* Inner dot */}
      <div id="custom-cursor" style={{
        position: "fixed", top: 0, left: 0, width: 8, height: 8, borderRadius: "50%",
        background: T.accent,
        pointerEvents: "none", zIndex: 9999, mixBlendMode: "difference",
      }} />
      {/* Outer ring â expands on hover, follows slightly behind */}
      <div id="cursor-ring" data-x="-100" data-y="-100" style={{
        position: "fixed", top: 0, left: 0, width: 48, height: 48, borderRadius: "50%",
        border: `1.5px solid ${isHovering ? T.accent : "rgba(255,255,255,0.2)"}`,
        background: "transparent",
        pointerEvents: "none", zIndex: 9998,
        opacity: isHovering ? 1 : 0.4,
        transition: "border 0.3s, opacity 0.3s, width 0.3s, height 0.3s",
        display: "flex", alignItems: "center", justifyContent: "center",
      }}>
        {label && <span style={{
          fontFamily: T.sans, fontSize: 9, fontWeight: 600, color: T.accent,
          letterSpacing: "1px", textTransform: "uppercase", whiteSpace: "nowrap",
          opacity: isHovering ? 1 : 0, transition: "opacity 0.2s",
        }}>{label}</span>}
      </div>
    </React.Fragment>
  );
}

// âââ ETHEREAL BACKGROUND â Intentional ambient layer âââ
function EtherealBackground() {
  // Single-element approach: all gradients layered as backgrounds on one full-screen div.
  // No child divs with edges = no subpixel flicker on high-refresh monitors.
  // Animation via CSS background-position shifts on the container.
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none", overflow: "hidden" }}>
      <div style={{
        position: "absolute", inset: 0,
        background: [
          "radial-gradient(ellipse 60% 60% at 25% 20%, rgba(255,77,0,0.12) 0%, rgba(255,77,0,0.06) 25%, rgba(255,77,0,0.02) 45%, transparent 70%)",
          "radial-gradient(ellipse 55% 50% at 70% 45%, rgba(255,120,60,0.10) 0%, rgba(255,100,40,0.04) 30%, transparent 65%)",
          "radial-gradient(ellipse 65% 45% at 40% 75%, rgba(255,50,0,0.08) 0%, rgba(255,60,10,0.03) 30%, transparent 65%)",
          "radial-gradient(ellipse 45% 45% at 55% 50%, rgba(160,140,255,0.04) 0%, rgba(160,140,255,0.015) 35%, transparent 60%)",
        ].join(", "),
      }} />
      {/* Film grain */}
      <div style={{
        position: "absolute", inset: 0, opacity: 0.35,
        backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E")`,
        backgroundSize: "200px 200px",
      }} />
    </div>
  );
}

function Hero() {
  const isMobile = useIsMobile();
  const [loaded, setLoaded] = useState(false);
  const [activeImg, setActiveImg] = useState(0);
  const sectionRef = useRef(null);
  const scrollProg = useScrollProgress(sectionRef);
  const [mousePos, setMousePos] = useState({ x: 0.5, y: 0.5 });
  useEffect(() => { setTimeout(() => setLoaded(true), 200); }, []);

  // Track mouse position for kinetic "Movements" text
  useEffect(() => {
    const onMove = (e) => {
      setMousePos({ x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight });
    };
    window.addEventListener("mousemove", onMove, { passive: true });
    return () => window.removeEventListener("mousemove", onMove);
  }, []);

  useEffect(() => {
    const interval = setInterval(() => {
      setActiveImg(prev => (prev + 1) % heroImages.length);
    }, 5000);
    return () => clearInterval(interval);

  // progress 0 = section enters bottom of viewport, 1 = leaves top
  // We want reveals to happen in the 0.15â0.55 range (early-to-mid scroll)
  const labelOpacity = Math.max(0, Math.min(1, (progress - 0.1) * 6));
  const pOpacity = Math.max(0, Math.min(1, (progress - 0.35) * 5));
  const pY = Math.max(0, 20 * (1 - pOpacity));
  const lineWidth = Math.max(0, Math.min(80, (progress - 0.4) * 400));

  return (
    <section ref={sectionRef} style={{
      padding: "clamp(80px, 12vw, 160px) clamp(24px, 5vw, 64px)",
      textAlign: "center", position: "relative", zIndex: 1,

      <h2 style={{ fontFamily: T.serif, fontSize: "clamp(36px, 8vw, 120px)", fontWeight: 300, lineHeight: 1.15, color: T.text, margin: 0 }}>
        {words.map((word, i) => {
          const wordStart = 0.12 + i * 0.07;
          const wordOpacity = Math.max(0, Math.min(1, (progress - wordStart) * 6));
          const wordY = Math.max(0, 35 * (1 - wordOpacity));
          return (
            <span key={i} style={{
              display: "inline-block", margin: "0 0.15em",

function ProjectCard({ project, index, variant = "square" }) {
  const [hovered, setHovered] = useState(false);
  const { setActiveProject } = React.useContext(ProjectContext);
  const isMobile = useIsMobile();
  const cardRef = useRef(null);
  const progress = useScrollProgress(cardRef);
  const ref = cardRef;
  // Card fades/slides in based on scroll position â appears during 0.05â0.3 range
  const enterOpacity = Math.max(0, Math.min(1, (progress - 0.05) * 4));
  const enterY = Math.max(0, 60 * (1 - enterOpacity));
  const parallaxY = enterOpacity >= 1 ? (progress - 0.5) * -20 : 0;
  const aspectMap = { hero: "21/9", square: "4/3", tall: "3/4" };

  return (
    <div
      ref={(el) => { ref.current = el; cardRef.current = el; }}
      onClick={() => setActiveProject(project)}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        opacity: enterOpacity,
        transform: `translateY(${enterY + parallaxY}px)`,
        cursor: "pointer",
      }}
    >
      <div data-cursor="View" style={{
        position: "relative", overflow: "hidden",
        borderRadius: 8,
        aspectRatio: aspectMap[variant],
      }}>
        <div style={{
          position: "absolute", inset: "-8%",
          backgroundImage: `url(${project.image})`,
          backgroundSize: "cover", backgroundPosition: project.cropHint || "center",
          transform: hovered ? "scale(1.05)" : "scale(1)",
          transition: "transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)",
        }} />
        <div style={{
          position: "absolute", inset: 0,
          background: hovered
            ? "linear-gradient(to top, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.15) 50%, transparent 70%)"
            : "linear-gradient(to top, rgba(10,10,10,0.5) 0%, transparent 35%)",
          transition: "background 0.5s ease",
        }} />
        {!isMobile && <div style={{
          position: "absolute", top: 16, left: 16,
          padding: "6px 14px", borderRadius: 20,
          background: "rgba(255,255,255,0.1)", backdropFilter: "blur(12px)",
          border: "1px solid rgba(255,255,255,0.1)",
          fontFamily: T.sans, fontSize: 10, fontWeight: 600,
          color: "rgba(255,255,255,0.8)", letterSpacing: "1.5px", textTransform: "uppercase",
          opacity: hovered ? 1 : 0, transform: hovered ? "translateY(0)" : "translateY(-10px)",
          transition: "all 0.4s cubic-bezier(0.16, 1, 0.3, 1)",
        }}>
          {project.category}
        </div>}
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "20px 20px 18px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
            <div>
              <span style={{
                fontFamily: T.sans, fontSize: 11, color: T.textFaint, letterSpacing: "1px",
                display: "block", marginBottom: 6,
                opacity: hovered ? 1 : 0, transform: hovered ? "translateY(0)" : "translateY(8px)",
                transition: "all 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.05s",
              }}>{project.year}</span>
              <h3 style={{
                fontFamily: T.serif, fontSize: "clamp(22px, 2.5vw, 36px)",
                fontWeight: 400, color: "#fff", margin: 0, lineHeight: 1.1,
                transform: hovered ? "translateY(0)" : "translateY(4px)",
                transition: "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)",
              }}>
                {project.title}
              </h3>
            </div>
            <div style={{
              width: 36, height: 36, borderRadius: "50%",
              border: `1px solid ${hovered ? T.accent : "rgba(255,255,255,0.15)"}`,

            }}>

              display: "inline-block", marginRight: "0.28em",
              opacity: 0.08 + wordProgress * 0.92,
              transform: `translateY(${(1 - wordProgress) * 8}px)`,
              transition: "none",
            }}>
              {word}
            </span>
          );
        })}
      </p>
    </section>
  );
}

// âââ SELECTED WORK INDEX (FIX #6: Redesigned hover â sliding thumbnail + accent bar) âââ
function ArchiveList() {
  const [hoveredIndex, setHoveredIndex] = useState(-1);
  const [expanded, setExpanded] = useState(false);
  const isMobile = useIsMobile();
  const gridCols = isMobile ? "32px 1fr 28px" : "48px 1fr 140px 100px 36px";
  const INITIAL_COUNT = isMobile ? 7 : 5;
  const visibleWork = !expanded ? selectedWork.slice(0, INITIAL_COUNT) : selectedWork;
  const hasMore = selectedWork.length > INITIAL_COUNT;

  return (
    <section style={{
      padding: isMobile ? "60px 0" : "clamp(80px, 10vw, 140px) 0",
      position: "relative", overflow: "hidden", zIndex: 1,
    }}>
      <div style={{ position: "relative", zIndex: 1, padding: isMobile ? "0 16px" : "0 clamp(24px, 5vw, 64px)" }}>
        <div style={{ marginBottom: isMobile ? 28 : 48, display: "flex", justifyContent: isMobile ? "center" : "space-between", alignItems: "flex-end", textAlign: isMobile ? "center" : "left" }}>
          <div>
            <span style={{ fontFamily: T.sans, fontSize: 11, fontWeight: 600, color: T.accent, letterSpacing: "3px", textTransform: "uppercase" }}>Index</span>
            <h2 style={{ fontFamily: T.serif, fontSize: isMobile ? 28 : "clamp(32px, 4vw, 56px)", fontWeight: 300, color: T.text, margin: "8px 0 0", lineHeight: 1 }}>
              Selected Work
            </h2>
          </div>
        </div>

        {/* Header row */}
        <div style={{
          display: "grid", gridTemplateColumns: gridCols,
          gap: isMobile ? 8 : 16, padding: "0 0 16px",
          borderBottom: `1px solid ${T.border}`,
        }}>
          <span style={{ fontFamily: T.sans, fontSize: 10, fontWeight: 600, color: T.textFaint, letterSpacing: "1.5px", textTransform: "uppercase" }}>No.</span>
          <span style={{ fontFamily: T.sans, fontSize: 10, fontWeight: 600, color: T.textFaint, letterSpacing: "1.5px", textTransform: "uppercase" }}>Project</span>
          {!isMobile && <span style={{ fontFamily: T.sans, fontSize: 10, fontWeight: 600, color: T.textFaint, letterSpacing: "1.5px", textTransform: "uppercase" }}>Discipline</span>}
          {!isMobile && <span style={{ fontFamily: T.sans, fontSize: 10, fontWeight: 600, color: T.textFaint, letterSpacing: "1.5px", textTransform: "uppercase" }}>Client</span>}
          <span />
        </div>

        {visibleWork.map((project, i) => (
          <ArchiveRow key={project.title + i} project={project} index={i}
            isHovered={hoveredIndex === i}
            onHover={() => setHoveredIndex(i)}
            onLeave={() => setHoveredIndex(-1)}
          />
        ))}

        {/* Show More / Show Less button */}
        {hasMore || expanded ? (
          <button onClick={() => setExpanded(!expanded)} style={{
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            width: "100%", padding: "16px 0", marginTop: 4,
            background: "none", border: "none", borderBottom: `1px solid ${T.border}`,
            cursor: "pointer", fontFamily: T.sans, fontSize: 12, fontWeight: 600,
            color: T.accent, letterSpacing: "1.5px", textTransform: "uppercase",
          }}>
            {expanded ? "Show Less" : `Show All (${selectedWork.length})`}
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"
              style={{ transform: expanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.3s ease" }}>
              <path d="M3 6L8 11L13 6" stroke={T.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
        ) : null}
      </div>
    </section>
  );
}

function ArchiveRow({ project, index, isHovered, onHover, onLeave }) {
  const [ref, visible] = useInView({ threshold: 0.1 });
  const rowRef = useRef(null);
  const [mouseX, setMouseX] = useState(0);
  const isMobile = useIsMobile();
  const { setActiveProject } = React.useContext(ProjectContext);
  const gridCols = isMobile ? "32px 1fr 28px" : "48px 1fr 140px 100px 36px";

  const handleMouseMove = useCallback((e) => {
    if (!rowRef.current) return;
    const rect = rowRef.current.getBoundingClientRect();
    setMouseX(e.clientX - rect.left);
  }, []);

  return (
    <div
      ref={(el) => { ref.current = el; rowRef.current = el; }}
      data-cursor={isMobile ? undefined : "View"}
      onClick={() => setActiveProject(project)}
      onMouseEnter={isMobile ? undefined : onHover}
      onMouseLeave={isMobile ? undefined : onLeave}
      onMouseMove={isMobile ? undefined : handleMouseMove}
      style={{
        display: "grid", gridTemplateColumns: gridCols,
        gap: isMobile ? 8 : 16, padding: isMobile ? "14px 0" : "18px 0",
        borderBottom: `1px solid ${isHovered && !isMobile ? "rgba(255,77,0,0.2)" : T.border}`,
        alignItems: "center", cursor: "pointer",
        position: "relative",
        transition: "border-color 0.3s ease",
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(20px)",
        transitionProperty: "opacity, transform, border-color",
        transitionDuration: "0.6s, 0.6s, 0.3s",
        transitionTimingFunction: "cubic-bezier(0.16, 1, 0.3, 1)",
        transitionDelay: `${(index % 8) * 0.03}s`,
      }}
    >
      {/* Floating preview image â desktop only */}
      {!isMobile && project.image && (
        <div style={{
          position: "absolute",
          bottom: "100%", left: Math.min(Math.max(mouseX - 110, 0), 600),
          width: 220, height: 150,
          borderRadius: 8, overflow: "hidden",
          boxShadow: "0 12px 40px rgba(0,0,0,0.6)",
          opacity: isHovered ? 1 : 0,
          transform: isHovered ? "translateY(-12px) scale(1)" : "translateY(0) scale(0.9)",
          transition: "opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1), transform 0.35s cubic-bezier(0.16, 1, 0.3, 1)",
          pointerEvents: "none", zIndex: 20,
          border: `1px solid rgba(255,255,255,0.08)`,
        }}>
          <div style={{
            width: "100%", height: "100%",
            backgroundImage: `url(${project.image})`,
            backgroundSize: "cover", backgroundPosition: project.cropHint || "center",
            transform: isHovered ? "scale(1.05)" : "scale(1)",
            transition: "transform 0.6s ease",
          }} />
          <div style={{
            position: "absolute", bottom: 0, left: 0, right: 0, height: "40%",
            background: "linear-gradient(to top, rgba(10,10,10,0.6), transparent)",
          }} />
        </div>
      )}

      {/* Hover accent bar on left â desktop only */}
      {!isMobile && <div style={{
        position: "absolute", left: -16, top: "50%", transform: "translateY(-50%)",
        width: 3, height: isHovered ? "60%" : 0,
        background: T.accent, borderRadius: 2,
        transition: "height 0.3s cubic-bezier(0.16, 1, 0.3, 1)",
      }} />}

      <span style={{
        fontFamily: T.sans, fontSize: isMobile ? 11 : 13, color: isHovered && !isMobile ? T.accent : T.textFaint, fontWeight: 500,
        fontVariantNumeric: "tabular-nums", transition: "color 0.3s",
      }}>
        {String(index + 1).padStart(2, "0")}
      </span>

      <span style={{
        fontFamily: T.serif, fontSize: isMobile ? 18 : "clamp(20px, 2.2vw, 30px)", fontWeight: 400,
        color: isHovered && !isMobile ? T.text : "rgba(255,255,255,0.75)",
        transition: "color 0.3s ease, transform 0.3s ease",
        whiteSpace: isMobile ? "normal" : "nowrap",
        transform: isHovered && !isMobile ? "translateX(8px)" : "translateX(0)",
      }}>
        {project.title}
      </span>

      {!isMobile && <span style={{ fontFamily: T.sans, fontSize: 13, color: T.textMuted, fontWeight: 500 }}>
        {project.category}
      </span>}
      {!isMobile && <span style={{ fontFamily: T.sans, fontSize: 12, color: isHovered ? "rgba(255,255,255,0.6)" : T.textFaint, fontWeight: 400, transition: "color 0.3s" }}>
        {project.client}
      </span>}

      <div style={{
        width: isMobile ? 24 : 28, height: isMobile ? 24 : 28, borderRadius: "50%",
        border: `1px solid ${isHovered && !isMobile ? T.accent : T.border}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        background: isHovered && !isMobile ? T.accent : "transparent",
        transform: isHovered && !isMobile ? "rotate(-45deg)" : "rotate(0deg)",
        transition: "all 0.3s cubic-bezier(0.16, 1, 0.3, 1)",
      }}>
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
          <path d="M3 8H13M13 8L8 3M13 8L8 13" stroke={isHovered && !isMobile ? "#fff" : "rgba(255,255,255,0.25)"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </div>
    </div>
  );
}

function ClientLogoItem({ name, visible, index, isMobile }) {
  const logo = CLIENT_LOGOS[name];
  if (!logo) return null;
  const h = isMobile ? logo.mh : logo.h;

  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "center",
      flex: isMobile ? "0 0 33.33%" : "0 0 16.66%",
      height: isMobile ? logo.mh + 36 : logo.h + 56,
      opacity: visible ? 0.58 : 0,
      transform: visible ? "translateY(0)" : "translateY(8px)",
      transition: `all 0.5s cubic-bezier(0.16, 1, 0.3, 1) ${index * 0.04}s, opacity 0.3s ease`,
      cursor: "default",
    }}
      onMouseEnter={e => { e.currentTarget.style.opacity = "0.9"; }}
      onMouseLeave={e => { if (e.currentTarget.closest('section').__visible) e.currentTarget.style.opacity = "0.58"; }}
    >
      <div style={{ height: h, display: "flex", alignItems: "center" }}>
        {logo.svg("rgba(255,255,255,0.95)")}
      </div>
    </div>
  );
}

function ClientLogos() {
  const [ref, visible] = useInView({ threshold: 0.15 });
  const isMobile = useIsMobile();
  const sectionRef = useRef(null);

  useEffect(() => {
    if (sectionRef.current) sectionRef.current.__visible = visible;
  }, [visible]);

  const row1 = clients.slice(0, isMobile ? clients.length : 6);
  const row2 = isMobile ? [] : clients.slice(6);

  return (
    <section ref={(el) => { ref.current = el; sectionRef.current = el; }} style={{
      padding: isMobile ? "40px 20px" : "clamp(48px, 6vw, 80px) clamp(40px, 5vw, 80px)",
      position: "relative", zIndex: 1,
    }}>
      <div style={{ textAlign: "center", marginBottom: isMobile ? 24 : 36 }}>
        <span style={{
          fontFamily: T.sans, fontSize: 10, fontWeight: 600, color: T.accent,
          letterSpacing: "3px", textTransform: "uppercase",
          opacity: visible ? 1 : 0, transition: "opacity 0.6s ease",
        }}>Trusted By</span>
      </div>
      <div style={{
        borderTop: `1px solid ${T.border}`, borderBottom: `1px solid ${T.border}`,
        padding: isMobile ? "8px 0" : "0",
      }}>
        <div style={{
          display: "flex", flexWrap: isMobile ? "wrap" : "nowrap",
          justifyContent: "center", alignItems: "center",
        }}>
          {row1.map((name, i) => (
            <ClientLogoItem key={name} name={name} visible={visible} index={i} isMobile={isMobile} />
          ))}
        </div>
        {row2.length > 0 && <div style={{
          display: "flex", justifyContent: "center", alignItems: "center",
        }}>
          {row2.map((name, i) => (
            <ClientLogoItem key={name} name={name} visible={visible} index={i + 6} isMobile={isMobile} />
          ))}
        </div>}
      </div>
    </section>
  );
}

// âââ ABOUT SECTION â Dramatic entrance âââ
function AboutSection() {
  const sectionRef = useRef(null);
  const progress = useScrollProgress(sectionRef);
  const [ref, visible] = useInView({ threshold: 0.08 });
  const isMobile = useIsMobile();
  const imageY = isMobile ? 0 : (progress - 0.5) * -30;
  const textY = isMobile ? 0 : (progress - 0.5) * 15;

  // Split headline into words for staggered reveal
  const headlineWords1 = ["I", "build", "experiences"];
  const headlineWords2 = ["people"];

  return (
    <section id="about" ref={(el) => { ref.current = el; sectionRef.current = el; }} style={{
      padding: isMobile ? "60px 20px" : "clamp(80px, 12vw, 160px) clamp(24px, 5vw, 64px)",
      position: "relative", overflow: "hidden", zIndex: 1,
      minHeight: isMobile ? "auto" : "100vh", display: "flex", alignItems: "center",
    }}>
      {/* Large decorative accent number in background */}
      {!isMobile && <div style={{
        position: "absolute", top: "10%", right: "5%", fontFamily: T.serif,
        fontSize: "clamp(200px, 25vw, 400px)", fontWeight: 300, color: "transparent",
        WebkitTextStroke: `1px rgba(255,77,0,${visible ? 0.06 : 0})`,
        lineHeight: 0.85, userSelect: "none", pointerEvents: "none",
        transition: "all 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s",
        transform: visible ? "translateY(0)" : "translateY(40px)",
      }}>15+</div>}

      {/* Animated vertical divider line â desktop only */}
      {!isMobile && <div style={{
        position: "absolute", left: "50%", top: "15%", bottom: "15%", width: 1,
        background: `linear-gradient(to bottom, transparent, ${T.accent}, transparent)`,
        transformOrigin: "top center",
        animation: visible ? "aboutLineGrow 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both" : "none",
        opacity: visible ? 0.3 : 0,
      }} />}

      <div style={{
        display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr",
        gap: isMobile ? 32 : "clamp(40px, 6vw, 100px)", alignItems: "center",
        width: "100%",
      }}>
        {/* Image side â clip-path wipe reveal */}
        <div style={{
          transform: `translateY(${imageY}px)`,
          animation: visible ? "clipRevealLeft 1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both" : "none",
          opacity: visible ? 1 : 0,
        }}>
          <div style={{
            borderRadius: 8, overflow: "hidden", aspectRatio: "4/3.7",
            position: "relative", maxHeight: "70vh",
          }}>
            <img src="img/portrait.png"
              alt="Benja Juster"
              style={{
                width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 5%",
                background: T.bg,
              }}
            />
            {/* Accent bar at bottom */}
            <div style={{
              position: "absolute", bottom: 0, left: 0, height: 3,
              background: T.accent,
              animation: visible ? "accentWipe 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both" : "none",

            {/* Corner frame marks */}
            <div style={{ position: "absolute", top: 12, left: 12, width: 24, height: 24,

            <div style={{ position: "absolute", bottom: 12, right: 12, width: 24, height: 24,
              borderBottom: `1.5px solid ${T.accent}`, borderRight: `1.5px solid ${T.accent}`,
              opacity: visible ? 0.5 : 0, transition: "opacity 0.6s ease 0.6s",
            }} />
          </div>
        </div>

        {/* Text side â staggered reveal */}
        <div style={{ transform: `translateY(${textY}px)` }}>
          {/* Label with animated accent line */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <div style={{
              height: 1, background: T.accent,
              animation: visible ? "accentWipe 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both" : "none",
            }} />
            <span style={{
              fontFamily: T.sans, fontSize: 11, fontWeight: 600, color: T.accent,

              opacity: visible ? 1 : 0, transition: "opacity 0.5s ease 0.5s",

          </div>

          {/* Headline with word-by-word split reveal */}
          <h2 style={{ fontFamily: T.serif, fontSize: isMobile ? "clamp(28px, 8vw, 40px)" : "clamp(36px, 4.5vw, 64px)", fontWeight: 300, color: T.text, lineHeight: 1.15, overflow: "hidden" }}>
            <span style={{ display: "block", overflow: "hidden" }}>
              {headlineWords1.map((word, i) => (
                <span key={i} style={{

                  animation: visible ? `splitReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) ${0.4 + i * 0.08}s both` : "none",

              ))}

            <span style={{ display: "block", overflow: "hidden" }}>
              {headlineWords2.map((word, i) => (
                <span key={i} style={{

                  animation: visible ? `splitReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) ${0.65 + i * 0.08}s both` : "none",

                display: "inline-block", fontStyle: "italic", color: T.accent,
                animation: visible ? `splitReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.75s both` : "none",

// âââ FOOTER SHADER â Mouse-reactive WebGL aurora background âââ
function FooterShader({ containerRef }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const container = containerRef.current;
    if (!container || typeof THREE === "undefined") return;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.domElement.style.cssText = "position:absolute;inset:0;width:100%;height:100%;pointer-events:none;";
    container.insertBefore(renderer.domElement, container.firstChild);
    canvasRef.current = renderer.domElement;

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const clock = new THREE.Clock();

    const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;
    const fragmentShader = `
      precision highp float;
      uniform vec2 iResolution;
      uniform float iTime;
      uniform vec2 iMouse;

      float random(vec2 st) {
        return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
      }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(random(i), random(i + vec2(1.0, 0.0)), u.x),
          mix(random(i + vec2(0.0, 1.0)), random(i + vec2(1.0, 1.0)), u.x),
          u.y
        );
      }
      float fbm(vec2 p) {
        float v = 0.0, a = 0.5;
        for (int i = 0; i < 5; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
        return v;
      }
      void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * iResolution.xy) / iResolution.y;
        vec2 mouse = (iMouse - 0.5 * iResolution.xy) / iResolution.y;
        float t = iTime * 0.15;

        // FBM curtain flowing upward
        vec2 p = uv;
        p.y += 0.5;
        float f = fbm(vec2(p.x * 2.5, p.y * 1.5 + t));
        float curtain = smoothstep(0.15, 0.55, f) * (1.0 - p.y * 0.8);

        // Mouse flare â warm glow follows cursor
        float d = length(uv - mouse);
        float flare = smoothstep(0.35, 0.0, d);

        // Warm color palette (orange/amber to match brand)
        vec3 c1 = vec3(0.95, 0.3, 0.0);   // brand orange
        vec3 c2 = vec3(1.0, 0.55, 0.15);   // warm amber
        vec3 c3 = vec3(0.8, 0.15, 0.05);   // deep red
        vec3 fc = vec3(1.0, 0.85, 0.6);    // warm white flare

        vec3 color = mix(c1, c2, p.y + 0.3) * curtain * 0.35;
        color += c3 * fbm(p * 3.0 - t) * 0.15;
        color += fc * flare * curtain * 1.2;

        // Fade to transparent at edges
        float vignette = smoothstep(1.2, 0.3, length(uv * vec2(0.8, 1.0)));
        color *= vignette;

        // Keep it subtle â this is a background
        color *= 0.5;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const uniforms = {
      iTime: { value: 0 },
      iResolution: { value: new THREE.Vector2() },
      iMouse: { value: new THREE.Vector2(-100, -100) },
    };
    const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms, transparent: true });
    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

    const dpr = renderer.getPixelRatio();
    const onResize = () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h);
      uniforms.iResolution.value.set(w * dpr, h * dpr);
    };
    window.addEventListener("resize", onResize);
    onResize();

    const onMouseMove = (e) => {
      const rect = container.getBoundingClientRect();
      uniforms.iMouse.value.set((e.clientX - rect.left) * dpr, (rect.height - (e.clientY - rect.top)) * dpr);
    };
    container.addEventListener("mousemove", onMouseMove);

    renderer.setAnimationLoop(() => {
      uniforms.iTime.value = clock.getElapsedTime();
      renderer.render(scene, camera);
    });

    return () => {
      window.removeEventListener("resize", onResize);
      container.removeEventListener("mousemove", onMouseMove);
      renderer.setAnimationLoop(null);
      if (canvasRef.current && canvasRef.current.parentNode) {
        canvasRef.current.parentNode.removeChild(canvasRef.current);
      }
      material.dispose();
      renderer.dispose();
    };
  }, []);

  return null;
}

// âââ SCROLL PROGRESS BAR âââ
function ScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(h > 0 ? window.scrollY / h : 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, height: 2, zIndex: 200, background: "transparent" }}>
      <div style={{ height: "100%", width: `${progress * 100}%`, background: T.accent, transition: "width 0.1s linear" }} />
    </div>
  );
}

// âââ PROJECT DETAIL OVERLAY âââ
const ProjectContext = React.createContext();

function ProjectDetailOverlay() {
  const { activeProject, setActiveProject } = React.useContext(ProjectContext);
  const [show, setShow] = useState(false);
  const [activeGalleryIdx, setActiveGalleryIdx] = useState(0);
  const [heroHover, setHeroHover] = useState(false);
  const [imgOrientation, setImgOrientation] = useState(null);
  const [heroOpacity, setHeroOpacity] = useState(0);
  const prevOrientationRef = React.useRef(null);
  const overlayRef = React.useRef(null);
  const isMobile = useIsMobile();
  const project = activeProject;
  const allProjects = [...featured, ...selectedWork.filter(sw => !featured.some(f => f.title === sw.title))];
  const currentIdx = project ? allProjects.findIndex(p => p.title === project.title) : -1;

  useEffect(() => {
    if (project) {
      setActiveGalleryIdx(0);
      setHeroOpacity(0);
      setImgOrientation(null);
      prevOrientationRef.current = null;
      if (overlayRef.current) overlayRef.current.scrollTop = 0;
      requestAnimationFrame(() => {
        if (overlayRef.current) overlayRef.current.scrollTop = 0;
        setShow(true);
      });
      document.body.style.overflow = "hidden";
    }
    return () => { document.body.style.overflow = ""; };
  }, [project]);

  const handleClose = () => {
    setShow(false);
    setTimeout(() => setActiveProject(null), 500);
  };

  const goToProject = (dir) => {
    const next = (currentIdx + dir + allProjects.length) % allProjects.length;
    setShow(false);
    setTimeout(() => {
      setActiveProject(allProjects[next]);
      if (overlayRef.current) overlayRef.current.scrollTop = 0;
      requestAnimationFrame(() => setShow(true));
    }, 300);
  };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") handleClose();
      if (e.key === "ArrowRight") goToProject(1);
      if (e.key === "ArrowLeft") goToProject(-1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [project, currentIdx]);

  // Detect portrait vs landscape for current gallery image
  useEffect(() => {
    if (!project) return;
    const gallery = (project.gallery && project.gallery.length > 0) ? project.gallery : [project.image];
    const src = gallery[activeGalleryIdx];
    if (!src) return;
    const img = new Image();
    img.onload = () => {
      const newOrientation = img.naturalHeight > img.naturalWidth ? "portrait" : "landscape";
      if (prevOrientationRef.current !== null && newOrientation !== prevOrientationRef.current) {
        setHeroOpacity(0);
        setTimeout(() => {
          setImgOrientation(newOrientation);
          prevOrientationRef.current = newOrientation;
          setTimeout(() => setHeroOpacity(1), 50);
        }, 200);
      } else {
        setImgOrientation(newOrientation);
        prevOrientationRef.current = newOrientation;
        setHeroOpacity(1);
      }
    };
    img.src = src;
  }, [activeGalleryIdx, project]);

  if (!project) return null;

  const allMedia = [...((project.gallery && project.gallery.length > 0) ? project.gallery : [project.image])];
  const hasVideo = !!project.video;

  const NavArrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }} style={{
      position: "fixed", top: "50%", [dir === -1 ? "left" : "right"]: 20,
      transform: "translateY(-50%)", zIndex: 10000,
      width: 48, height: 48, borderRadius: "50%",
      background: "rgba(255,255,255,0.06)", border: `1px solid ${T.border}`,
      display: "flex", alignItems: "center", justifyContent: "center",
      cursor: "pointer", transition: "all 0.3s ease",
      opacity: show ? 1 : 0,
    }}
    onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.12)"; e.currentTarget.style.borderColor = T.accent; }}
    onMouseLeave={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; e.currentTarget.style.borderColor = T.border; }}
    >
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
        <path d={dir === -1 ? "M10 3L5 8L10 13" : "M6 3L11 8L6 13"} stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    </button>
  );

  return (
    <div ref={overlayRef} onClick={handleClose} style={{
      position: "fixed", inset: 0, zIndex: 9999,
      background: show ? "rgba(0,0,0,0.94)" : "rgba(0,0,0,0)",
      backdropFilter: show ? "blur(24px)" : "blur(0px)",
      transition: "all 0.5s cubic-bezier(0.16, 1, 0.3, 1)",
      display: "flex", flexDirection: isMobile ? "column" : "row",
      alignItems: isMobile ? "stretch" : "flex-start", justifyContent: "center",
      overflowY: isMobile ? "hidden" : "auto", cursor: "pointer",
    }}>
      {/* Mobile: fixed top bar OUTSIDE scroll container â never scrolls away */}
      {isMobile && (
        <div onClick={(e) => e.stopPropagation()} style={{
          flexShrink: 0, display: "flex", justifyContent: "space-between", alignItems: "center",
          padding: "12px 16px", background: "rgba(0,0,0,0.95)", zIndex: 10,
          cursor: "default",
        }}>
          <span style={{ fontFamily: T.sans, fontSize: 12, color: T.textFaint, letterSpacing: "1px" }}>
            {String(currentIdx + 1).padStart(2, "0")} / {String(allProjects.length).padStart(2, "0")}
          </span>
          <button onClick={handleClose} style={{
            background: "rgba(255,255,255,0.1)", border: `1px solid ${T.border}`,
            borderRadius: "50%", width: 40, height: 40,
            display: "flex", alignItems: "center", justifyContent: "center",
            cursor: "pointer", transition: "all 0.3s ease",
          }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M3 3L13 13M13 3L3 13" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" />
            </svg>
          </button>
        </div>
      )}

      {/* Prev / Next arrows â desktop only */}
      {!isMobile && <NavArrow dir={-1} onClick={() => goToProject(-1)} />}
      {!isMobile && <NavArrow dir={1} onClick={() => goToProject(1)} />}

      <div onClick={(e) => e.stopPropagation()} style={{
        width: isMobile ? "100%" : "min(940px, 90vw)",
        padding: isMobile ? "0 16px 60px" : "60px 0 80px",
        opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(40px)",
        transition: "all 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s",
        cursor: "default",
        ...(isMobile ? { flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch" } : {}),
      }}>
        {/* Top bar â counter + close (desktop only; mobile version is above scroll container) */}
        {!isMobile && (
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            marginBottom: 28,
          }}>
            <span style={{ fontFamily: T.sans, fontSize: 12, color: T.textFaint, letterSpacing: "1px" }}>
              {String(currentIdx + 1).padStart(2, "0")} / {String(allProjects.length).padStart(2, "0")}
            </span>
            <button onClick={handleClose} style={{
              background: "rgba(255,255,255,0.1)", border: `1px solid ${T.border}`,
              borderRadius: "50%", width: 40, height: 40,
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer", transition: "all 0.3s ease",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.12)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; }}
            >
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M3 3L13 13M13 3L3 13" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" />
              </svg>
            </button>
          </div>
        )}

        {/* Hero image / gallery â click to advance, hover arrows */}
        {(() => {
          const goPrev = (e) => { e.stopPropagation(); setActiveGalleryIdx((activeGalleryIdx - 1 + allMedia.length) % allMedia.length); };
          const goNext = (e) => { e.stopPropagation(); setActiveGalleryIdx((activeGalleryIdx + 1) % allMedia.length); };
          const HeroArrow = ({ dir, onClick }) => (
            <button onClick={onClick} style={{
              position: "absolute", top: "50%", [dir === -1 ? "left" : "right"]: isMobile ? 8 : 16,
              transform: "translateY(-50%)", zIndex: 3,
              width: isMobile ? 32 : 40, height: isMobile ? 32 : 40, borderRadius: "50%",
              background: "rgba(0,0,0,0.5)", border: "1px solid rgba(255,255,255,0.2)",
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer", backdropFilter: "blur(8px)",
              opacity: isMobile ? 0.7 : (heroHover ? 1 : 0), transition: "opacity 0.3s ease, background 0.2s ease",
              pointerEvents: isMobile ? "auto" : (heroHover ? "auto" : "none"),
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = T.accent; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "rgba(0,0,0,0.5)"; }}
            >
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d={dir === -1 ? "M10 3L5 8L10 13" : "M6 3L11 8L6 13"} stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
          );
          return (
            <div
              onMouseEnter={() => setHeroHover(true)}
              onMouseLeave={() => setHeroHover(false)}
              style={{ position: "relative", width: "100%", height: isMobile ? "40vh" : "60vh", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}
            >
              <div
                onClick={goNext}
                style={{
                  height: "100%", aspectRatio: imgOrientation === "portrait" ? "3/4" : "16/9", maxWidth: "100%",
                  borderRadius: 10, overflow: "hidden", background: "#0F0F0F",
                  position: "relative", cursor: allMedia.length > 1 ? "pointer" : "default",
                  opacity: heroOpacity, transition: "opacity 0.2s ease",
                }}
              >
                <div style={{
                  width: "100%", height: "100%",
                  backgroundImage: `url(${allMedia[activeGalleryIdx]})`,
                  backgroundSize: "contain",
                  backgroundPosition: "center",
                  backgroundRepeat: "no-repeat",
                }} />
                {/* Image counter pill */}
                {allMedia.length > 1 && (
                  <div style={{
                    position: "absolute", bottom: 12, right: 14, zIndex: 3,
                    fontFamily: T.sans, fontSize: 11, letterSpacing: "0.5px",
                    color: "rgba(255,255,255,0.8)", background: "rgba(0,0,0,0.5)",
                    padding: "4px 10px", borderRadius: 20, backdropFilter: "blur(8px)",
                  }}>{activeGalleryIdx + 1} / {allMedia.length}</div>
                )}
              </div>
              {allMedia.length > 1 && <HeroArrow dir={-1} onClick={goPrev} />}
              {allMedia.length > 1 && <HeroArrow dir={1} onClick={goNext} />}
            </div>
          );
        })()}

        {/* Gallery thumbnails with scroll arrows */}
        {allMedia.length > 1 && (() => {
          const stripRef = React.createRef();
          const scrollStrip = (dir) => {
            if (stripRef.current) stripRef.current.scrollBy({ left: dir * 320, behavior: "smooth" });
          };
          const ThumbArrow = ({ dir }) => (
            <button onClick={() => scrollStrip(dir)} style={{
              position: "absolute", top: "50%", [dir === -1 ? "left" : "right"]: -4,
              transform: "translateY(-50%)", zIndex: 2,
              width: 28, height: 28, borderRadius: "50%",
              background: "rgba(0,0,0,0.7)", border: `1px solid ${T.border}`,
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer", color: "#fff", fontSize: 14, lineHeight: 1,
              backdropFilter: "blur(8px)",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = T.accent; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "rgba(0,0,0,0.7)"; }}
            >
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                <path d={dir === -1 ? "M10 3L5 8L10 13" : "M6 3L11 8L6 13"} stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
          );
          return (
            <div style={{ position: "relative", marginBottom: 32 }}>
              {allMedia.length > 8 && <ThumbArrow dir={-1} />}
              <div ref={stripRef} style={{
                display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4,
                scrollbarWidth: "none", msOverflowStyle: "none",
                WebkitOverflowScrolling: "touch",
                maskImage: allMedia.length > 8 ? "linear-gradient(to right, transparent 0px, black 32px, black calc(100% - 32px), transparent 100%)" : "none",
                WebkitMaskImage: allMedia.length > 8 ? "linear-gradient(to right, transparent 0px, black 32px, black calc(100% - 32px), transparent 100%)" : "none",
              }}>
                {allMedia.map((img, i) => (
                  <div key={i} onClick={() => setActiveGalleryIdx(i)} style={{
                    width: 72, height: 48, borderRadius: 6, overflow: "hidden", cursor: "pointer", flexShrink: 0,
                    border: i === activeGalleryIdx ? `2px solid ${T.accent}` : `2px solid transparent`,
                    opacity: i === activeGalleryIdx ? 1 : 0.5,
                    transition: "all 0.3s ease",
                  }}>
                    <div style={{ width: "100%", height: "100%", backgroundImage: `url(${img})`, backgroundSize: "cover", backgroundPosition: "center" }} />
                  </div>
                ))}
              </div>
              {allMedia.length > 8 && <ThumbArrow dir={1} />}
            </div>
          );
        })()}

        {/* YouTube video embed â works on benja.art (domain-restricted on localhost) */}
        {hasVideo && (
          <div style={{
            width: "100%", aspectRatio: "16/9", borderRadius: 10, overflow: "hidden",
            marginBottom: 32, background: T.surface,
          }}>
            <iframe
              src={`https://www.youtube.com/embed/${project.video}?rel=0&modestbranding=1`}
              style={{ width: "100%", height: "100%", border: "none" }}
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowFullScreen
            />
          </div>
        )}

        {/* Meta row */}
        <div style={{ display: "flex", gap: 32, marginBottom: 20, flexWrap: "wrap" }}>
          {[
            { label: "Client", value: project.client },
            { label: "Role", value: project.category },
            { label: "Year", value: project.year },
          ].map((m) => (
            <div key={m.label}>
              <span style={{ fontFamily: T.sans, fontSize: 10, fontWeight: 600, letterSpacing: "2px", textTransform: "uppercase", color: T.accent, display: "block", marginBottom: 4 }}>{m.label}</span>
              <span style={{ fontFamily: T.sans, fontSize: 14, color: T.text }}>{m.value}</span>
            </div>
          ))}
        </div>

        {/* Title */}
        <h2 style={{
          fontFamily: T.serif, fontSize: "clamp(36px, 5vw, 56px)", fontWeight: 300,
          color: T.text, margin: "0 0 20px", lineHeight: 1.1,
        }}>{project.title}</h2>

        {/* Description */}
        <p style={{
          fontFamily: T.sans, fontSize: 16, color: T.textMuted, lineHeight: 1.7,
          maxWidth: 640, margin: 0,
        }}>{project.desc}</p>

        {/* Stats */}
        {project.stats && project.stats.length > 0 && (
          <div style={{
            display: "flex", gap: 32, marginTop: 28, flexWrap: "wrap",
          }}>
            {project.stats.map((s, i) => (
              <div key={i} style={{ textAlign: "left" }}>
                <span style={{
                  fontFamily: T.sans, fontSize: "clamp(24px, 2.5vw, 36px)", fontWeight: 700,
                  color: T.accent, display: "block", lineHeight: 1.1,
                }}>{s.stat}</span>
                <span style={{
                  fontFamily: T.sans, fontSize: 10, fontWeight: 600, letterSpacing: "1.5px",
                  textTransform: "uppercase", color: T.textMuted, marginTop: 4, display: "block",
                }}>{s.label}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ width: 60, height: 2, background: T.accent, margin: "40px 0", borderRadius: 1 }} />

        {/* Prev/next text links */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexDirection: isMobile ? "column" : "row", gap: isMobile ? 16 : 0 }}>
          <button onClick={() => goToProject(-1)} style={{
            background: "none", border: "none", cursor: "pointer", padding: 0,
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M10 3L5 8L10 13" stroke={T.textFaint} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
            <span style={{ fontFamily: T.sans, fontSize: 13, color: T.textFaint }}>
              {allProjects[(currentIdx - 1 + allProjects.length) % allProjects.length].title}
            </span>
          </button>
          <button onClick={() => goToProject(1)} style={{
            background: "none", border: "none", cursor: "pointer", padding: 0,
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <span style={{ fontFamily: T.sans, fontSize: 13, color: T.textFaint }}>
              {allProjects[(currentIdx + 1) % allProjects.length].title}
            </span>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M6 3L11 8L6 13" stroke={T.textFaint} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  );
}

// âââ APP âââ
function App() {
  const [activeProject, setActiveProject] = useState(null);

  return (
    <ProjectContext.Provider value={{ activeProject, setActiveProject }}>
      <CustomCursor />
      <EtherealBackground />
      <ScrollProgress />
      <Nav />
      <Hero />
      <Marquee />
      <StatementSection />
      <ClientLogos />
      <FeaturedShowcase />
      <PhilosophySection />
      <ArchiveList />
      <AboutSection />
      <HighlightsStrip />
      <Footer />
      <ProjectDetailOverlay />
    </ProjectContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
