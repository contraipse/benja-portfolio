<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Benja</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Fraunces:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .code {
      font-family: 'Fraunces', serif;
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 400;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 24px;
      color: rgba(255, 255, 255, 0.08);
    }
    .message {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 40px;
      font-weight: 400;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #FF4D00;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }
    .back-link .arrow { transition: transform 0.2s; }
    .back-link:hover .arrow { transform: translateX(-4px); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="message">This page doesn't exist.</p>
  <a href="/" class="back-link">
    <span class="arrow">←</span> Back to portfolio
  </a>
</body>
</html>
